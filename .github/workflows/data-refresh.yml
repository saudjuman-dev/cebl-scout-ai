name: Refresh Player Data (Scheduled)

# Pulls latest player data from EuroBasket, regenerates the static
# global-pros.js, runs audits, and commits changes back to main.
#
# Schedule: every Sunday at 03:00 UTC (≈10pm ET Saturday). Plus manual
# trigger from the Actions tab for ad-hoc refreshes.
#
# Required GitHub Secrets:
#   EUROBASKET_EMAIL     — login email for eurobasket.com subscriber
#   EUROBASKET_PASSWORD  — login password
#
# Optional Secrets:
#   SCRAPE_LEAGUES       — comma-separated league codes to bulk-scrape
#                           (e.g. "GER-1,FRA-1,ITA-1,BSL,ESP-1")

on:
  schedule:
    - cron: '0 3 * * 0'     # Sundays 03:00 UTC
  workflow_dispatch:        # Manual trigger
    inputs:
      leagues:
        description: 'Comma-separated league codes to bulk-scrape (overrides SCRAPE_LEAGUES secret)'
        required: false
        default: ''
      force:
        description: 'Force re-fetch even if cached <30 days'
        type: boolean
        default: false

permissions:
  contents: write           # need to commit refreshed data back to repo

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # bulk scrapes can take a while
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/eurobasket-mcp/package-lock.json

      - name: Install scraper deps
        working-directory: tools/eurobasket-mcp
        run: npm ci

      - name: Refresh existing player cache
        env:
          EUROBASKET_EMAIL: ${{ secrets.EUROBASKET_EMAIL }}
          EUROBASKET_PASSWORD: ${{ secrets.EUROBASKET_PASSWORD }}
        run: |
          if [ -n "$EUROBASKET_EMAIL" ]; then
            echo "🔄 Running cache-updater on $(wc -l < tools/cebl-players.txt) tracked players…"
            node tools/cache-updater.js
          else
            echo "⚠️  No EUROBASKET_EMAIL secret set — skipping cache refresh"
          fi

      - name: Bulk-scrape leagues (if configured)
        env:
          EUROBASKET_EMAIL: ${{ secrets.EUROBASKET_EMAIL }}
          EUROBASKET_PASSWORD: ${{ secrets.EUROBASKET_PASSWORD }}
          LEAGUES: ${{ github.event.inputs.leagues || secrets.SCRAPE_LEAGUES || '' }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          if [ -n "$LEAGUES" ]; then
            FORCE_FLAG=""
            if [ "$FORCE" = "true" ]; then FORCE_FLAG="--force"; fi
            echo "🌐 Bulk-scraping leagues: $LEAGUES"
            node tools/league-scraper.js --leagues "$LEAGUES" $FORCE_FLAG
          else
            echo "⏭️  No SCRAPE_LEAGUES configured — skipping bulk league scrape"
          fi

      - name: Regenerate global-pros.js
        run: node tools/extract-global-pros.js

      - name: Audit data integrity
        run: |
          node tools/audit-data.js
          node tools/cache-health.js

      - name: Commit changes (if any)
        run: |
          git config user.name  "Hoops Intelligence Bot"
          git config user.email "actions@github.com"
          git add data/cache/ global-pros.js tools/audit-report.json tools/cache-health-report.json
          if git diff --cached --quiet; then
            echo "✅ No data changes — nothing to commit"
          else
            CHANGED=$(git diff --cached --numstat | wc -l)
            git commit -m "🤖 Auto-refresh player data ($CHANGED files)" \
                       -m "Triggered by: ${{ github.event_name }}" \
                       -m "Run: ${{ github.run_id }}"
            git push
            echo "✅ Pushed refreshed data"
          fi

      - name: Upload audit reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports-${{ github.run_id }}
          path: |
            tools/audit-report.json
            tools/cache-health-report.json
          retention-days: 30
